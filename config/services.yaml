# config/services.yaml

parameters:
    uploads_dir: '%kernel.project_dir%/public/uploads/resources'

services:
    # Default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            string $groqApiKey: '%env(string:GROQ_API_KEY)%'
            string $resendApiKey: '%env(string:RESEND_API_KEY)%'
            string $hfApiToken: '%env(string:HF_API_TOKEN)%'
            string $huggingFaceApiToken: '%env(string:HF_API_TOKEN)%'
            bool $localCommentFilterEnabled: '%env(bool:LOCAL_COMMENT_FILTER_ENABLED)%'
            bool $localFilterAllowOnApiFailure: '%env(bool:LOCAL_FILTER_ALLOW_ON_API_FAILURE)%'

    # Makes classes in src/ available to be used as services
    # This creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Explicit service configuration
    App\Service\ZoomApiService:
        arguments:
            $httpClient: '@http_client'
            $logger: '@logger'
            $zoomClientId: '%env(ZOOM_CLIENT_ID)%'
            $zoomClientSecret: '%env(ZOOM_CLIENT_SECRET)%'
            $zoomAccountId: '%env(ZOOM_ACCOUNT_ID)%'

    App\Service\CompreFaceClient:
        arguments:
            $baseUrl: '%env(COMPREFACE_BASE_URL)%'
            $apiKey: '%env(COMPREFACE_API_KEY)%'
            $minSimilarity: '%env(float:COMPREFACE_MIN_SIMILARITY)%'

    App\Service\GoogleAnalyticsResourceMetricsService:
        arguments:
            $ga4PropertyId: '%env(string:GA4_PROPERTY_ID)%'
            $ga4CredentialsPath: '%env(string:GA4_CREDENTIALS_PATH)%'
            $ga4LookbackDays: '%env(int:GA4_LOOKBACK_DAYS)%'
            $projectDir: '%kernel.project_dir%'


    App\Security\FaceLoginAuthenticator:
        autowire: true
        autoconfigure: true
        tags:
            - { name: security.authenticator }

    App\Service\TwilioSmsService:
        arguments:
            $twilioAccountSid: '%env(TWILIO_ACCOUNT_SID)%'
            $twilioAuthToken: '%env(TWILIO_AUTH_TOKEN)%'
            $twilioFromNumber: '%env(TWILIO_FROM_NUMBER)%'

    App\MessageHandler\GenerateMoodPdfMessageHandler:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\HuggingFaceForumAnalysisService:
        arguments:
            $apiToken: '%env(HUGGINGFACE_API_TOKEN)%'
            $modelName: '%env(HUGGINGFACE_FORUM_MODEL)%'
            $urgencyThreshold: '%env(float:HUGGINGFACE_URGENCY_THRESHOLD)%'
            $urgencyMargin: '%env(float:HUGGINGFACE_URGENCY_MARGIN)%'
