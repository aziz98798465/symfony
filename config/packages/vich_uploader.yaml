vich_uploader:
    db_driver: orm
    mappings:
        appointment_reports:
            uri_prefix: /uploads/appointment-reports
            upload_destination: '%kernel.project_dir%/public/uploads/appointment-reports'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            delete_on_update: true
            delete_on_remove: true
