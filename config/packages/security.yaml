security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    role_hierarchy:
        ROLE_PSYCHOLOGUE: ROLE_ETUDIANT
        ROLE_ADMIN:       [ROLE_PSYCHOLOGUE, ROLE_ETUDIANT]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/login_check
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            jwt: ~

        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker # <-- Added this line

            custom_authenticators:
                - App\Security\FaceLoginAuthenticator

            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: email
                password_parameter: password
                enable_csrf: false
                default_target_path: app_redirect

            logout:
                path: app_logout
                target: app_login

    access_control:
        # 🔓 PUBLIC (MUST BE FIRST)
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/login/face, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/verify-code, roles: PUBLIC_ACCESS }
        - { path: ^/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/resend-code, roles: PUBLIC_ACCESS }
        - { path: ^/verify-email, roles: PUBLIC_ACCESS }
        - { path: ^/cron, roles: PUBLIC_ACCESS }  # Cron webhook endpoint

        # 🔓 JWT LOGIN
        - { path: ^/api/login_check, roles: PUBLIC_ACCESS }

        




        # 🔐 API ENDPOINTS
        # Public access for availability (students need this for booking, only shows busy slots)
        - { path: ^/api/psychologue/\d+/availability$, roles: PUBLIC_ACCESS }
        # Public access for AI suggestions (used in booking form)
        - { path: ^/api/psychologue/\d+/ai-suggest-times$, roles: PUBLIC_ACCESS }
        - { path: ^/api/psychologue/\d+/ai-patterns$, roles: PUBLIC_ACCESS }
        # Other psychologue API endpoints require psychologue role
        - { path: ^/api/psychologue, roles: ROLE_PSYCHOLOGUE }

        # 🔐 API (JWT)
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

        # 🔐 LOGGED USERS
        - { path: ^/redirect, roles: [ROLE_ETUDIANT, ROLE_PSYCHOLOGUE, ROLE_ADMIN] }
        - { path: ^/logout, roles: [ROLE_ETUDIANT, ROLE_PSYCHOLOGUE, ROLE_ADMIN] }
        - { path: ^/profile, roles: [ROLE_ETUDIANT, ROLE_PSYCHOLOGUE, ROLE_ADMIN] }
        - { path: ^/home, roles: [ROLE_ETUDIANT, ROLE_PSYCHOLOGUE, ROLE_ADMIN] }
        - { path: ^/forum, roles: [ROLE_ETUDIANT, ROLE_PSYCHOLOGUE, ROLE_ADMIN] }
        - { path: ^/events, roles: [ROLE_ETUDIANT, ROLE_PSYCHOLOGUE, ROLE_ADMIN] }
        - { path: ^/events, roles: [ROLE_ETUDIANT, ROLE_PSYCHOLOGUE, ROLE_ADMIN] }
        - { path: ^/mes-reservations, roles: [ROLE_ETUDIANT, ROLE_PSYCHOLOGUE, ROLE_ADMIN] }

        - { path: ^/resources, roles: [ROLE_ETUDIANT, ROLE_PSYCHOLOGUE, ROLE_ADMIN] }
        - { path: ^/translate, roles: [ROLE_ETUDIANT, ROLE_PSYCHOLOGUE, ROLE_ADMIN] }
        - { path: ^/commentaire, roles: [ROLE_ETUDIANT, ROLE_PSYCHOLOGUE, ROLE_ADMIN] }
        - { path: ^/mood, roles: [ROLE_ETUDIANT, ROLE_PSYCHOLOGUE, ROLE_ADMIN] }
        - { path: ^/journal, roles: [ROLE_ETUDIANT, ROLE_PSYCHOLOGUE, ROLE_ADMIN] }
        - { path: ^/dashboard, roles: [ROLE_ETUDIANT, ROLE_PSYCHOLOGUE, ROLE_ADMIN] }



        # 🔒 ROLE-SPECIFIC
        - { path: ^/admin, roles: [ROLE_ADMIN, ROLE_PSYCHOLOGUE] }
        - { path: ^/forum, roles: ROLE_ADMIN }

        - { path: ^/reservation, roles: [ROLE_ETUDIANT, ROLE_PSYCHOLOGUE, ROLE_ADMIN] }

        # Student personal medical dossier
        - { path: ^/mon-dossier-medical, roles: ROLE_ETUDIANT }
        - { path: ^/mes-rendezvous, roles: ROLE_ETUDIANT }


        # 🔒 ROLE-SPECIFIC
        - { path: ^/admin, roles: [ROLE_ADMIN, ROLE_PSYCHOLOGUE] }
        - { path: ^/psychologue, roles: ROLE_PSYCHOLOGUE }

        # 🤖 CHATBOT API
        - { path: ^/chatbot, roles: [ROLE_ETUDIANT, ROLE_PSYCHOLOGUE, ROLE_ADMIN] }

        # 🚨 CATCH-ALL (MUST BE LAST)
        - { path: ^/, roles: ROLE_USER }
