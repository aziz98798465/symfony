services:
  _defaults:
    autowire: true
    autoconfigure: true

  # Event Notification Bundle Services
  App\Bundles\EventNotificationBundle\Service\EventNotificationService:
    arguments:
      - '@mailer'
      - '@logger'
      - '%env(MAILER_FROM)%'

  App\Bundles\EventNotificationBundle\EventListener\:
    resource: '../../EventListener'
    tags:
      - { name: 'doctrine.orm.entity_listener' }

  App\Bundles\EventNotificationBundle\:
    resource: '../../{Service,EventListener}'
    exclude: '../../{Entity,Repository,Tests}'
